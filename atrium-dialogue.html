<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Atrium Dialogue Export</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #101217;
      color: #f2f0e8;
    }
    body {
      margin: 0;
      padding: 32px;
      background: #101217;
    }
    main {
      max-width: 1100px;
      margin: 0 auto;
    }
    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      border-bottom: 1px solid #343844;
      padding-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }
    a {
      color: #9ecbff;
    }
    .actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 15px;
    }
    pre {
      margin: 0;
      padding: 22px;
      min-height: 60vh;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      border: 1px solid #343844;
      background: #181b22;
      color: #f8f5ec;
      font: 15px/1.55 Consolas, "Courier New", monospace;
    }
    @media (max-width: 700px) {
      body {
        padding: 18px;
      }
      header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Atrium Dialogue Export</h1>
      <nav class="actions" aria-label="Dialogue file actions">
        <a href="atrium-dialogue.txt">Open raw text file</a>
        <a href="atrium-dialogue.txt" download>Download text file</a>
        <a href="/">Back to Radwall</a>
      </nav>
    </header>
    <pre id="dialogue">Loading dialogue export...</pre>
  </main>
  <script>
    fetch("atrium-dialogue.txt", { cache: "no-store" })
      .then((response) => {
        if (!response.ok) throw new Error("Unable to load atrium-dialogue.txt");
        return response.text();
      })
      .then((text) => {
        document.getElementById("dialogue").textContent = text;
      })
      .catch((error) => {
        document.getElementById("dialogue").textContent = error.message;
      });
  </script>
</body>
</html>
