<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Atrium</title>
    <link rel="preload" href="/atrium/audio/Atrium_stereo_1mb.mp3" as="audio" type="audio/mpeg" />
    <style>
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: #000; }
      #app { display: none; }
      canvas { display: block; width: 100vw !important; height: 100vh !important; }
      @supports (width: 100dvw) {
        canvas { width: 100dvw !important; height: 100dvh !important; }
      }
      #build-diagnostics {
        position: fixed;
        top: max(10px, env(safe-area-inset-top));
        right: max(10px, env(safe-area-inset-right));
        z-index: 10001;
        display: grid;
        justify-items: end;
        gap: 2px;
        padding: 7px 9px;
        border: 1px solid rgba(158, 255, 174, 0.65);
        border-radius: 3px;
        background: rgba(3, 12, 7, 0.78);
        color: #b7ffc2;
        font: 700 11px/1.25 "Courier New", monospace;
        letter-spacing: 0.04em;
        text-shadow: 0 0 5px rgba(91, 255, 121, 0.7);
        pointer-events: none;
        user-select: none;
      }
      #burned-visibility-gradient {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9000;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(8, 7, 8, 0) 0%,
          rgba(8, 7, 8, 0.04) 28%,
          rgba(8, 7, 8, 0.24) 46%,
          rgba(8, 7, 8, 0.54) 68%,
          rgba(8, 7, 8, 0.82) 100%
        );
        pointer-events: none;
      }
      #landscape-guard {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 10000;
        box-sizing: border-box;
        align-items: center;
        justify-content: center;
        padding:
          max(24px, env(safe-area-inset-top))
          max(24px, env(safe-area-inset-right))
          max(24px, env(safe-area-inset-bottom))
          max(24px, env(safe-area-inset-left));
        background: #08090d;
        color: #f7f3ea;
        font-family: Arial, sans-serif;
        text-align: center;
      }
      #landscape-guard button {
        min-width: 220px;
        min-height: 56px;
        padding: 14px 22px;
        border: 2px solid #f7f3ea;
        border-radius: 4px;
        background: #b52c36;
        color: #fff;
        font: 700 18px/1.2 Arial, sans-serif;
        cursor: pointer;
      }
      #landscape-guard .rotate-icon {
        display: block;
        margin: 0 auto 18px;
        font-size: 52px;
        line-height: 1;
        transform: rotate(90deg);
      }
      #landscape-guard p {
        margin: 0 0 20px;
        font-size: 20px;
        line-height: 1.35;
      }
      @media (orientation: portrait) {
        html.mobile-device #landscape-guard { display: flex; }
      }
      @media (orientation: portrait) and (max-width: 600px) {
        #landscape-guard { display: flex; }
      }
    </style>
    <script>
      if (matchMedia("(pointer: coarse)").matches || navigator.maxTouchPoints > 0) {
        document.documentElement.classList.add("mobile-device");
      }
    </script>
    <script type="module" crossorigin src="/atrium/assets/index-ChedvSPu.js?v=playtest-fixes-9"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="build-diagnostics" aria-label="Atrium build diagnostics">
      <span id="build-version">ATRIUM BETA 0.7.2</span>
      <span id="fps-counter">FPS --</span>
    </div>
    <div id="burned-visibility-gradient" aria-hidden="true"></div>
    <div id="landscape-guard" role="dialog" aria-modal="true" aria-label="Landscape orientation required">
      <div>
        <span class="rotate-icon" aria-hidden="true">&#8635;</span>
        <p>Rotate your phone to landscape.</p>
        <button id="landscape-lock-button" type="button">Play in landscape</button>
      </div>
    </div>
    <script>
      (() => {
        const counter = document.getElementById("fps-counter");
        let frames = 0;
        let sampleStarted = performance.now();

        function updateFps(now) {
          frames += 1;
          const elapsed = now - sampleStarted;
          if (elapsed >= 500) {
            counter.textContent = `FPS ${Math.round((frames * 1000) / elapsed)}`;
            frames = 0;
            sampleStarted = now;
          }
          requestAnimationFrame(updateFps);
        }

        requestAnimationFrame(updateFps);
      })();
    </script>
  </body>
</html>
